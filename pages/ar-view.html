<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR ko'rish | AR platforma</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body class="ar-page">
  <div class="ar-ui" id="arHelp">
    <div class="ar-info">
      <b>AR rejim:</b> telefon kamerasi ochilgach HIRO markerga qarating. Marker ustida tanlangan 3D tarmoq obyekti chiqadi.
      <button class="ar-close" type="button" aria-label="Ko'rsatmani yopish">x</button>
    </div>
    <a class="back" href="../index.html">Orqaga</a>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; colorManagement: true"
    vr-mode-ui="enabled: false">
    <a-marker preset="hiro" id="mainMarker">
      <a-entity id="arObject" position="0 0 0" scale="1 1 1"></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const params = new URLSearchParams(location.search);
    const model = params.get('model') || 'topology';
    const el = document.getElementById('arObject');

    function label(value, pos = '0 1.15 0', scale = '1 1 1') {
      return `<a-text value="${value}" position="${pos}" rotation="-70 0 0" align="center" color="#ffffff" scale="${scale}"></a-text>`;
    }

    const objects = {
      router: `
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
          <a-box position="0 .2 0" width="1.8" height=".3" depth="1" color="#0f766e"></a-box>
          <a-cylinder position="-.55 .65 0" radius=".025" height=".9" color="#fff"></a-cylinder>
          <a-cylinder position=".55 .65 0" radius=".025" height=".9" color="#fff"></a-cylinder>
          <a-sphere position="-.65 .38 .45" radius=".06" color="#16a34a"></a-sphere>
          <a-sphere position="0 .38 .45" radius=".06" color="#f59e0b"></a-sphere>
          <a-sphere position=".65 .38 .45" radius=".06" color="#60a5fa"></a-sphere>
        </a-entity>
        ${label("ROUTER: paketlarni yo'naltiradi")}
      `,
      switch: `
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
          <a-box position="0 .2 0" width="2" height=".28" depth=".9" color="#2563eb"></a-box>
          <a-box position="-.7 .38 .46" width=".22" height=".09" depth=".04" color="#07111f"></a-box>
          <a-box position="-.35 .38 .46" width=".22" height=".09" depth=".04" color="#07111f"></a-box>
          <a-box position="0 .38 .46" width=".22" height=".09" depth=".04" color="#07111f"></a-box>
          <a-box position=".35 .38 .46" width=".22" height=".09" depth=".04" color="#07111f"></a-box>
          <a-box position=".7 .38 .46" width=".22" height=".09" depth=".04" color="#07111f"></a-box>
        </a-entity>
        ${label("SWITCH: LAN qurilmalarini bog'laydi")}
      `,
      server: `
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
          <a-box position="0 .75 0" width=".85" height="1.4" depth=".7" color="#64748b"></a-box>
          <a-box position="0 1.12 .36" width=".6" height=".09" depth=".03" color="#07111f"></a-box>
          <a-box position="0 .82 .36" width=".6" height=".09" depth=".03" color="#07111f"></a-box>
          <a-sphere position=".28 .42 .38" radius=".055" color="#16a34a"></a-sphere>
        </a-entity>
        ${label("SERVER: xizmat va ma'lumotlarni saqlaydi")}
      `,
      topology: `
        <a-entity>
          <a-box position="0 .2 0" width=".85" height=".25" depth=".52" color="#2563eb"></a-box>
          <a-box position="-1.12 .2 -.75" width=".48" height=".25" depth=".36" color="#0f766e"></a-box>
          <a-box position="1.12 .2 -.75" width=".48" height=".25" depth=".36" color="#0f766e"></a-box>
          <a-box position="0 .52 1" width=".62" height=".82" depth=".45" color="#64748b"></a-box>
          <a-cylinder position="-.56 .17 -.37" radius=".018" height="1.22" color="#ffffff" rotation="0 0 58"></a-cylinder>
          <a-cylinder position=".56 .17 -.37" radius=".018" height="1.22" color="#ffffff" rotation="0 0 -58"></a-cylinder>
          <a-cylinder position="0 .25 .52" radius=".018" height="1" color="#ffffff" rotation="90 0 0"></a-cylinder>
        </a-entity>
        ${label('LAN TOPOLOGIYASI')}
      `,
      osi: `
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
          <a-box position="0 .2 0" width="1.6" height=".18" depth=".55" color="#e11d48"></a-box>
          <a-box position="0 .42 0" width="1.6" height=".18" depth=".55" color="#f97316"></a-box>
          <a-box position="0 .64 0" width="1.6" height=".18" depth=".55" color="#f59e0b"></a-box>
          <a-box position="0 .86 0" width="1.6" height=".18" depth=".55" color="#16a34a"></a-box>
          <a-box position="0 1.08 0" width="1.6" height=".18" depth=".55" color="#06b6d4"></a-box>
          <a-box position="0 1.3 0" width="1.6" height=".18" depth=".55" color="#2563eb"></a-box>
          <a-box position="0 1.52 0" width="1.6" height=".18" depth=".55" color="#7c3aed"></a-box>
        </a-entity>
        ${label('OSI MODELI: 7 qatlam', '0 1.95 0', '0.9 0.9 0.9')}
      `,
      wifi: `
        <a-entity>
          <a-cylinder position="0 .35 0" radius=".08" height=".7" color="#0f766e"></a-cylinder>
          <a-sphere position="0 .78 0" radius=".13" color="#2563eb"></a-sphere>
          <a-torus position="0 .82 0" radius=".45" radius-tubular=".01" color="#ffffff" rotation="90 0 0" animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 1200"></a-torus>
          <a-torus position="0 .82 0" radius=".75" radius-tubular=".01" color="#ffffff" rotation="90 0 0" animation="property: scale; to: 1.25 1.25 1.25; dir: alternate; loop: true; dur: 1500"></a-torus>
        </a-entity>
        ${label('WI-FI: simsiz aloqa signali')}
      `
    };

    el.innerHTML = objects[model] || objects.topology;

    const arHelp = document.getElementById('arHelp');
    const closeButton = document.querySelector('.ar-close');
    closeButton.addEventListener('click', () => arHelp.classList.add('hidden'));
    setTimeout(() => arHelp.classList.add('hidden'), 7000);
  </script>
</body>
</html>
