<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Natija | AR platforma</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="../index.html">
        <span class="logo-badge">AR</span>
        <span>Kasbiy fanlar platformasi<small>Test natijasi</small></span>
      </a>
      <nav class="menu" aria-label="Asosiy menyu">
        <a href="../index.html">Bosh sahifa</a>
        <a href="topics.html">Mavzular</a>
        <a href="models.html">3D modellar</a>
        <a href="ar-view.html">AR ko'rish</a>
        <a href="test.html">Test</a>
        <a href="deploy.html">Server</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section test-box">
      <div class="card" style="text-align: center;">
        <p class="eyebrow" style="margin-left: auto; margin-right: auto;">Yakuniy baholash</p>
        <h1 class="section-title">Test natijasi</h1>
        <p class="result-number" id="score">0%</p>
        <p class="lead" id="message"></p>
        <div class="actions" style="justify-content: center;">
          <a class="btn primary" href="test.html">Qayta ishlash</a>
          <a class="btn" href="topics.html">Mavzularga qaytish</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const score = Number(localStorage.getItem('arTestScore') || 0);
    document.getElementById('score').textContent = score + '%';
    document.getElementById('message').textContent =
      score >= 80
        ? "A'lo! AR mavzularni yaxshi o'zlashtirdingiz."
        : score >= 60
          ? "Yaxshi natija. Ayrim mavzularni yana AR orqali ko'rib chiqing."
          : "Mavzularni qayta o'rganish va 3D modellarni yana ko'rish tavsiya etiladi.";
  </script>
</body>
</html>
